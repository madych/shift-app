<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シフト表</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: sans-serif; padding: 10px; }
.controls { margin-bottom: 8px; }
button { margin: 3px; padding: 6px 10px; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #999; padding: 6px; text-align: center; }
th { background: #f0f0f0; }
.name-input { border: none; width: 100%; min-width: 70px; text-align: center; }
.shift-cell { min-height: 28px; cursor: pointer; user-select: none; }
</style>
</head>
<body>

<h2>シフト表（月曜はじまり・月〜土）</h2>

<div class="controls">
  <button onclick="prevWeek()">◀ 前週</button>
  <strong id="weekLabel"></strong>
  <button onclick="nextWeek()">次週 ▶</button>
</div>

<div class="controls">
  <button onclick="addStaff()">＋スタッフ追加</button>
</div>

<table id="shiftTable">
  <tr id="headerRow"><th>名前</th></tr>
</table>

<script>
/* ===== 共通スタッフ保存 ===== */
let staffList = JSON.parse(localStorage.getItem("staffList")) || ["田中","佐藤"];

function saveStaffList(){
  localStorage.setItem("staffList", JSON.stringify(staffList));
}

/* ===== 週管理 ===== */
let currentMonday = getMonday(new Date());

function getMonday(d){
  const date = new Date(d);
  const day = date.getDay();
  const diff = (day===0?-6:1)-day;
  date.setDate(date.getDate()+diff);
  return date;
}

function formatDate(d){
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function weekKey(){
  return currentMonday.toISOString().slice(0,10);
}

/* ===== ヘッダー ===== */
function updateHeader(){
  const header=document.getElementById("headerRow");
  const days=["月","火","水","木","金","土"];
  header.innerHTML="<th>名前</th>";
  for(let i=0;i<6;i++){
    const d=new Date(currentMonday);
    d.setDate(d.getDate()+i);
    header.innerHTML+=`<th>${days[i]}<br>${formatDate(d)}</th>`;
  }
  document.getElementById("weekLabel").textContent=`${formatDate(currentMonday)} 週`;
}

/* ===== 週切替 ===== */
function prevWeek(){ saveWeek(); currentMonday.setDate(currentMonday.getDate()-7); loadWeek(); }
function nextWeek(){ saveWeek(); currentMonday.setDate(currentMonday.getDate()+7); loadWeek(); }

/* ===== スタッフ追加 ===== */
function addStaff(){
  const name=prompt("スタッフ名入力","");
  if(!name) return;
  staffList.push(name);
  saveStaffList();
  loadWeek();
}

/* ===== セル操作 ===== */
function toggleCell(cell){
  const presets=["","〇","9:00〜","17:00〜","19:00〜"];
  const cur=cell.textContent.trim();
  const idx=presets.indexOf(cur);
  if(idx===presets.length-1){
    const v=prompt("自由入力","");
    cell.textContent=v?v:"";
  }else{
    cell.textContent=presets[idx+1];
  }
  saveWeek();
}

/* ===== 保存 ===== */
function saveWeek(){
  const data=[];
  document.querySelectorAll("#shiftTable tr").forEach((row,i)=>{
    if(i===0)return;
    const shifts=[];
    for(let j=1;j<=6;j++) shifts.push(row.cells[j].textContent.trim());
    data.push(shifts);
  });
  localStorage.setItem("shift_"+weekKey(),JSON.stringify(data));
}

/* ===== 読み込み ===== */
function loadWeek(){
  updateHeader();
  const table=document.getElementById("shiftTable");
  while(table.rows.length>1) table.deleteRow(1);

  const saved=JSON.parse(localStorage.getItem("shift_"+weekKey())||"null");

  staffList.forEach((name,index)=>{
    const row=table.insertRow();
    row.innerHTML=`<td>${name}</td>${"<td class='shift-cell'></td>".repeat(6)}`;
    if(saved && saved[index]){
      for(let j=0;j<6;j++){
        row.cells[j+1].textContent=saved[index][j];
      }
    }
    row.querySelectorAll(".shift-cell").forEach(c=>{
      c.addEventListener("click",()=>toggleCell(c));
    });
  });
}

/* ===== 初期表示 ===== */
loadWeek();
</script>

</body>
</html>
