<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シフト表</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { font-family:sans-serif; text-align:center; }
table { border-collapse:collapse; margin:auto; }
th, td { border:1px solid #ccc; padding:6px; text-align:center; }
input { width:100%; border:none; text-align:center; }
button { margin:5px; padding:6px 10px; }
.name-col { min-width:80px; }
@media print {
  button { display:none; }
}
</style>
</head>

<body>

<h2>シフト表</h2>

<div>
<button onclick="prevWeek()">◀ 前週</button>
<span id="weekLabel"></span>
<button onclick="nextWeek()">次週 ▶</button>
</div>

<div>
<button onclick="addStaff()">＋スタッフ追加</button>
<button onclick="printA4()">A4印刷</button>
<button onclick="shareLine()">画像→LINE</button>
</div>

<div id="tableArea"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyA3-Qr9Vp_gTaOa5NK9ICGFAlfLcwhwmBx3iFYd_oDsvYuddotHwfxum-sj7Oi3aMB/exec";

let staff = [];
let shifts = {};
let weekStart = getMonday(new Date());

function getMonday(d){
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day==0?-6:1);
  return new Date(date.setDate(diff));
}

function formatDate(d){
  return (d.getMonth()+1)+"/"+d.getDate();
}

function weekKey(){
  return weekStart.toISOString().slice(0,10);
}

function render(){
  const area = document.getElementById("tableArea");
  const days = ["月","火","水","木","金","土"];
  let html = "<table><tr><th class='name-col'>名前</th>";

  let tempDate = new Date(weekStart);
  for(let i=0;i<6;i++){
    html += "<th>"+days[i]+"<br>"+formatDate(tempDate)+"</th>";
    tempDate.setDate(tempDate.getDate()+1);
  }
  html += "<th>削除</th></tr>";

  const key = weekKey();
  if(!shifts[key]) shifts[key]={};

  staff.forEach((name,i)=>{
    html+="<tr>";
    html+="<td><input value='"+name+"' onchange='updateName("+i+",this.value)'></td>";

    if(!shifts[key][i]) shifts[key][i]=["","","","","",""];

    for(let d=0;d<6;d++){
      html+="<td onclick='cycle("+i+","+d+")'>"+shifts[key][i][d]+"</td>";
    }

    html+="<td><button onclick='deleteStaff("+i+")'>🗑</button></td>";
    html+="</tr>";
  });

  html+="</table>";
  area.innerHTML=html;
  document.getElementById("weekLabel").innerText=formatDate(weekStart)+" 週";
}

function cycle(i,d){
  const key=weekKey();
  const list=["","〇","9:00〜","17:00〜","19:00〜"];
  let current=shifts[key][i][d];
  let idx=list.indexOf(current);
  if(idx==-1) idx=0;
  idx=(idx+1)%list.length;
  shifts[key][i][d]=list[idx];
  save();
  render();
}

function addStaff(){
  staff.push("新規");
  save();
  render();
}

function deleteStaff(i){
  staff.splice(i,1);
  save();
  render();
}

function updateName(i,val){
  staff[i]=val;
  save();
}

function prevWeek(){
  weekStart.setDate(weekStart.getDate()-7);
  load();
}

function nextWeek(){
  weekStart.setDate(weekStart.getDate()+7);
  load();
}

async function save(){
  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      staff:staff,
      shifts:shifts,
      weekStart:weekStart.toISOString()
    })
  });
}

async function load(){
  try{
    const res=await fetch(API_URL);
    const data=await res.json();
    if(data.staff) staff=data.staff;
    if(data.shifts) shifts=data.shifts;
  }catch(e){}
  render();
}

function printA4(){ window.print(); }

function shareLine(){
  html2canvas(document.getElementById("tableArea")).then(canvas=>{
    const link=document.createElement("a");
    link.download="shift.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

load();
</script>

</body>
</html>
