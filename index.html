<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>シフト表</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
body{font-family:sans-serif;text-align:center}
table{border-collapse:collapse;width:100%;table-layout:fixed}
th,td{border:1px solid #ccc;padding:6px;font-size:14px}
th:first-child,td:first-child{width:80px}
input{width:100%;border:none;text-align:center}
button{margin:4px;padding:6px 10px}
</style>
</head>
<body>

<h2>シフト表</h2>

<button onclick="prevWeek()">◀ 前週</button>
<span id="weekLabel"></span>
<button onclick="nextWeek()">次週 ▶</button>
<br>
<button onclick="addStaff()">＋スタッフ追加</button>
<button onclick="printA4()">🖨 A4印刷</button>
<button onclick="imageLine()">📸 画像→LINE</button>

<div id="shiftArea"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyA3-Qr9Vp_gTaOa5NK9ICGFAlfLcwhwmBx3iFYd_oDsvYuddotHwfxum-sj7Oi3aMB/exec";

let staff = [];
let shifts = {};
let weekStart = getMonday(new Date());

function getMonday(d){
  d = new Date(d);
  const day = d.getDay();
  const diff = d.getDate() - day + (day==0?-6:1);
  return new Date(d.setDate(diff));
}

function formatDate(d){
  return (d.getMonth()+1)+"/"+d.getDate();
}

function render(){
  const days = ["月","火","水","木","金","土"];
  let html = "<table><tr><th>名前</th>";
  for(let i=0;i<6;i++){
    const date = new Date(weekStart);
    date.setDate(date.getDate()+i);
    html += "<th>"+days[i]+"<br>"+formatDate(date)+"</th>";
  }
  html+="<th>削除</th></tr>";

  staff.forEach((name,i)=>{
    html+="<tr>";
    html+=`<td><input value="${name}" onchange="renameStaff(${i},this.value)"></td>`;
    for(let d=0;d<6;d++){
      const key=i+"_"+d;
      const val=shifts[key]||"";
      html+=`<td onclick="cycle(${i},${d})"><input value="${val}" onchange="updateShift(${i},${d},this.value)"></td>`;
    }
    html+=`<td><button onclick="deleteStaff(${i})">🗑</button></td>`;
    html+="</tr>";
  });

  html+="</table>";
  document.getElementById("shiftArea").innerHTML=html;
  document.getElementById("weekLabel").innerText=
    formatDate(weekStart)+" 週";
}

function cycle(i,d){
  const key=i+"_"+d;
  const list=["","〇","9:00〜","17:00〜","19:00〜"];
  const current=shifts[key]||"";
  const next=list[(list.indexOf(current)+1)%list.length];
  shifts[key]=next;
  save();
  render();
}

function updateShift(i,d,val){
  shifts[i+"_"+d]=val;
  save();
}

function renameStaff(i,val){
  staff[i]=val;
  save();
}

function deleteStaff(i){
  staff.splice(i,1);
  save();
  render();
}

function addStaff(){
  staff.push("名前");
  save();
  render();
}

function prevWeek(){
  weekStart.setDate(weekStart.getDate()-7);
  load();
}

function nextWeek(){
  weekStart.setDate(weekStart.getDate()+7);
  load();
}

async function save(){
  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      weekStart:weekStart.toISOString(),
      staff,
      shifts
    })
  });
}

async function load(){
  const res=await fetch(API_URL);
  const data=await res.json();
  if(data.weekStart) weekStart=getMonday(new Date(data.weekStart));
  if(data.staff) staff=data.staff;
  if(data.shifts) shifts=data.shifts;
  render();
}

function printA4(){
  window.print();
}

function imageLine(){
  html2canvas(document.body).then(canvas=>{
    const link=document.createElement("a");
    link.download="shift.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

load();
</script>
</body>
</html>
