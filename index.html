<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>シフト表</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
margin:10px;
}

table{
border-collapse:collapse;
margin:auto;
width:100%;
max-width:900px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
font-size:16px;
}

th{
background:#f5f5f5;
}

.name{
min-width:80px;
}

button{
margin:5px;
padding:8px 12px;
font-size:14px;
}

.delete-btn{
font-size:12px;
padding:4px 6px;
}

.no-print{
}

@media print{

button{
display:none;
}

.no-print{
display:none;
}

}

</style>
</head>

<body>

<h2>シフト表</h2>

<div>

<button onclick="prevWeek()">◀ 前週</button>

<span id="weekLabel"></span>

<button onclick="nextWeek()">次週 ▶</button>

</div>

<div>

<button onclick="addStaff()">＋スタッフ追加</button>

<button onclick="printTable()">A4印刷</button>

<button onclick="shareLine()">画像→LINE</button>

</div>

<div id="tableArea"></div>

<script>

let staff=["田中","佐藤"]

let shifts={}

let weekOffset=0

function getMonday(d){

d=new Date(d)

const day=d.getDay()

const diff=d.getDate()-day+(day==0?-6:1)

return new Date(d.setDate(diff))

}

function formatDate(d){

return (d.getMonth()+1)+"/"+d.getDate()

}

function getWeekDates(){

let monday=getMonday(new Date())

monday.setDate(monday.getDate()+weekOffset*7)

let dates=[]

for(let i=0;i<6;i++){

let dt=new Date(monday)

dt.setDate(monday.getDate()+i)

dates.push(dt)

}

return dates

}

function cycleShift(cell){

const list=["","〇","9:00〜","17:00〜","19:00〜"]

let v=cell.innerText.trim()

let i=list.indexOf(v)

i=(i+1)%list.length

cell.innerText=list[i]

}

function render(){

let dates=getWeekDates()

document.getElementById("weekLabel").innerText=

formatDate(dates[0])+" 週"

let html="<table>"

html+="<tr><th class='name'>名前</th>"

dates.forEach(d=>{

html+="<th>"+formatDate(d)+"</th>"

})

html+="<th class='no-print'>削除</th></tr>"

staff.forEach((s,i)=>{

html+="<tr>"

html+="<td contenteditable='true' class='name'>"+s+"</td>"

dates.forEach((d,di)=>{

html+="<td contenteditable='true' onclick='cycleShift(this)'></td>"

})

html+="<td class='no-print'><button class='delete-btn' onclick='deleteStaff("+i+")'>🗑</button></td>"

html+="</tr>"

})

html+="</table>"

document.getElementById("tableArea").innerHTML=html

}

function addStaff(){

staff.push("名前")

render()

}

function deleteStaff(i){

staff.splice(i,1)

render()

}

function prevWeek(){

weekOffset--

render()

}

function nextWeek(){

weekOffset++

render()

}

function printTable(){

window.print()

}

function shareLine(){

html2canvas(document.getElementById("tableArea")).then(canvas=>{

let link=document.createElement("a")

link.download="shift.png"

link.href=canvas.toDataURL()

link.click()

})

}

render()

</script>

</body>
</html>
